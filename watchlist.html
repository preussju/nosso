<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nosso</title>

    <script type="module" src="./js/watchlist.js"></script>
    <link rel="stylesheet" href="./styles/styles.css">

</head>

<body class="login">
    <h1>Lista de Verdade🍿</h1>
    
    <form id="watchlistForm">
    
        <input type="text" id="title" placeholder="Title" required>
        <select id="type">
    
            <option value="movie">
                Filme
            </option>
    
            <option value="series">
                Serie
            </option>
    
            <option value="anime">
                Anime
            </option>
    
        </select>
    
        <button type="submit">
            Add
        </button>
    
    </form>
    <hr>

    <div id="watchlistContainer"></div>
</body>

</html>
