<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nosso</title>

    <script type="module" src="./js/watchlist.js"></script>
    <link rel="stylesheet" href="./styles/styles.css">

</head>

<body class="login">

    <a href="./home.html">⬅️ tela inicial</a>

    <h1>Lista de Verdade🍿</h1>
    
    <form id="watchlistForm">
    
        <input type="text" id="title" placeholder="Title" required>
        <select id="type">
    
            <option value="movie">
                Filme
            </option>
    
            <option value="series">
                Série
            </option>
    
            <option value="anime">
                Anime
            </option>
    
        </select>
    
        <button type="submit">
            +
        </button>
    
    </form>
    <hr>

    <div class="filters">
    
        <button data-filter="all">
            todos
        </button>
    
        <button data-filter="movie">
            filmes
        </button>
    
        <button data-filter="series">
            séries
        </button>
    
        <button data-filter="anime">
            anime
        </button>
    
    </div>

    <h2>📺 Para Assistir</h2>
    <div id="toWatchContainer"></div>

    <h2>✅ Assistidos</h2>
    <div id="watchedContainer"></div>
</body>

</html>
